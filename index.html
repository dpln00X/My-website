<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn AI Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f111a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .welcome-container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #00cec9, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p {
            color: #b2bec3;
            font-size: 1.2rem;
        }

        .status-badge {
            display: inline-block;
            background-color: #1e272e;
            color: #00d2d3;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 20px;
            border: 1px solid #00d2d3;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>Mijn AI Platform</h1>
        <p>Stel al je vragen aan de live AI-assistent rechtsonder in je scherm!</p>
        
        <div class="status-badge">● Chatbase AI is Actief</div>
    </div>

    <script>
      window.embeddedChatbotConfig = {
        chatbotId: "QXykIJFGGmZlPDp0fZL9I",
        domain: "www.chatbase.co"
      }
    </script>
    <script src="https://www.chatbase.co/embed.min.js" chatbotId="HIER_KOMT_JOUW_ID" defer></script>
  <script>
(function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="QXykIJFGGmZlPDp0fZL9I";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
</script> 
</body>
</html>
