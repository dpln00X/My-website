<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolphin0x chat bot</title>
    <style>
        
        body {
            background-color: #000000;
            color: #00f2fe;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        
        .dolphin-gif {
            width: 150px;
            height: 150px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px #00f2fe);
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe;
        }

        p {
            color: #888;
            font-size: 1rem;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        
        .mega-chat-btn {
            background-color: transparent;
            color: #00f2fe;
            border: 3px solid #00f2fe;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 0px; 
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            transition: all 0.3s ease;
        }

        .mega-chat-btn:hover {
            background-color: #00f2fe;
            color: #000000;
            box-shadow: 0 0 30px #00f2fe, 0 0 50px #00f2fe;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="dolfijn.gif"alt="Dolphin" class="dolphin-gif">
        
        <h1>Dolphin0x Bot</h1>
        <p>[ System Online ]</p>
        
        <button class="mega-chat-btn" onclick="openChat()">Open Dolphin0x chat bot</button>
    </div>

    <script>
      window.embeddedChatbotConfig = {
        chatbotId: "QXykIJFGGmZlPDp0fZL9I",
        domain: "www.chatbase.co"
      }
      
     
      function openChat() {
          const iframe = document.getElementById("chatbase-message-bubble") || document.querySelector("[id^='chatbase']");
          if(iframe) {
              iframe.click(); 
          } else {
              alert("De chatbot laadt nog, momentje!");
          }
        }
    </script>
    <script src="https://www.chatbase.co/embed.min.js" chatbotId="QXykIJFGGmZlPDp0fZL9I" defer></script>

</body>
</html>
