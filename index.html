<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dolphin0x | Mobile OS</title>
    
    <!-- PWA Instellingen voor je Telefoon -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dolphin0x">

    <!-- De gratis sleutelloze AI-motor van Puter -->
    <script src="https://js.puter.com/v2/"></script>
    
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { margin: 0; background-color: #0b1120; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 10px; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 1100px; height: 95vh; background: #1e293b; border-radius: 20px; display: flex; overflow: hidden; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        
        .screen { display: none; width: 100%; height: 100%; }
        .screen.active { display: flex; }

        /* Startscherm */
        .start-screen { justify-content: center; align-items: center; padding: 20px; text-align: center; flex-direction: column; width: 100%; background: #0b1120; }
        .btn-start { background: linear-gradient(135deg, #38bdf8, #2563eb); color: white; padding: 20px 40px; font-size: 1.3rem; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }

        /* SIDEBAR (Normaal op desktop/iPad, uitschuifbaar op mobiel) */
        .sidebar { width: 280px; background: #0f172a; border-right: 1px solid #334155; display: flex; flex-direction: column; height: 100%; transition: transform 0.3s ease; z-index: 100; }
        .sidebar-tabs { display: flex; border-bottom: 1px solid #334155; }
        .tab-btn { flex: 1; padding: 15px; background: transparent; border: none; color: #94a3b8; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.9rem; }
        .tab-btn.active { color: #38bdf8; border-bottom: 2px solid #38bdf8; background: rgba(56, 189, 248, 0.05); }
        
        .tab-content { flex-grow: 1; overflow-y: auto; padding: 15px; display: none; }
        .tab-content.active { display: block; }
        .btn-new { width: 100%; background: #38bdf8; color: #0b1120; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 0.95rem; }
        
        /* Items in Sidebar */
        .item-list { display: flex; flex-direction: column; gap: 8px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1e293b; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
        .list-item:hover, .list-item.active { border-color: #38bdf8; background: #24334d; }
        .item-text { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9rem; }
        .btn-del { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 1.1rem; }

        /* HOOFDSCHERM CHAT */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #111827; height: 100%; width: 100%; }
        .chat-header { padding: 15px 20px; background: #0f172a; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 15px; }
        .chat-header h2 { margin: 0; color: #38bdf8; font-size: 1.2rem; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Hamburger Menu Knop */
        .menu-toggle { display: none; background: transparent; border: none; color: #38bdf8; font-size: 1.6rem; cursor: pointer; padding: 0; min-width: 30px; text-align: left; }

        .chat-box { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.4; font-size: 0.95rem; word-break: break-word; }
        .msg.user { background: #38bdf8; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }
        .msg.ai { background: #1e293b; color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* Typ Indicator */
        .typing-indicator { display: none; align-self: flex-start; background: #1e293b; padding: 12px 20px; border-radius: 15px; border-bottom-left-radius: 4px; }
        .typing-dots { display: flex; gap: 5px; align-items: center; height: 15px; }
        .dot { width: 7px; height: 7px; background: #38bdf8; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

        /* 💬 CHATBALK HOOGTE BIJGEWERKT (Van 48px naar 56px) */
        .input-bar { padding: 15px; background: #0f172a; display: flex; gap: 10px; border-top: 1px solid #334155; align-items: center; }
        .text-input { flex-grow: 1; height: 56px; background: #1e293b; border: 1px solid #475569; border-radius: 28px; padding: 0 20px; color: white; outline: none; font-size: 1rem; }
        .text-input:focus { border-color: #38bdf8; }
        .btn-icon { height: 56px; border: none; border-radius: 28px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; }
        .btn-send { background: #38bdf8; color: #000; padding: 0 22px; }
        .btn-mic { width: 56px; background: #10b981; color: white; padding: 0; }
        .btn-mic.active { background: #ef4444; animation: pulse 1s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }

        /* Code Storage Form */
        .code-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: #1e293b; padding: 10px; border-radius: 8px; }
        .code-form input, .code-form textarea { width: 100%; background: #0f172a; border: 1px solid #475569; color: white; padding: 8px; border-radius: 5px; outline: none; }
        .code-box { font-family: monospace; font-size: 0.8rem; background: #0f172a; padding: 8px; border-radius: 5px; margin-top: 5px; overflow-x: auto; color: #a7f3d0; max-height: 100px; }

        /* Donkere mobiele overlay */
        .sidebar-overlay { display: none; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); z-index: 99; }

        /* 📱 SPECIFIEKE TELEFOON RESPONSIVE STYLES */
        @media (max-width: 768px) {
            body { padding: 0; }
            .app-container { width: 100vw; height: 100vh; border-radius: 0; border: none; }
            .menu-toggle { display: block; } 
            
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%); 
            }
            .sidebar.open { transform: translateX(0); } 
            .sidebar-overlay.active { display: block; }
            
            .input-bar { padding-bottom: calc(15px + env(safe-area-inset-bottom)); } 
            .chat-header { padding-top: calc(15px + env(safe-area-inset-top)); } 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- DONKERE OVERLAY VOOR MOBIEL SLIDEOUT -->
        <div id="sidebarOverlay" class="sidebar-overlay" onclick="sluitSidebarMobile()"></div>

        <!-- SCHERM 1: START/UNLOCK -->
        <div id="startScreen" class="screen active start-screen">
            <h1 style="color: #38bdf8; font-size: 2.3rem; margin-bottom: 10px;">Dolphin0x OS</h1>
            <p style="color: #94a3b8; margin-bottom: 30px; font-size: 0.95rem; padding: 0 20px;">Activeer het systeem om spraakherkenning en de stem te starten op jouw telefoon.</p>
            <button class="btn-start" onclick="startSysteem()">⚡ Systeem Starten</button>
        </div>

        <!-- SCHERM 2: DE HOOFDOMGEVING -->
        <div id="mainScreen" class="screen">
            <!-- SIDEBAR -->
            <div id="sidebar" class="sidebar">
                <div class="sidebar-tabs">
                    <button id="tabChatsBtn" class="tab-btn active" onclick="switchTab('chats')">💬 Chats</button>
                    <button id="tabCodesBtn" class="tab-btn" onclick="switchTab('codes')">💾 Codes</button>
                </div>

                <!-- CHATS TAB -->
                <div id="tabChats" class="tab-content active">
                    <button class="btn-new" onclick="maakNieuweChat()">➕ Nieuwe Chat</button>
                    <div id="chatsList" class="item-list"></div>
                </div>

                <!-- CODE STORAGE TAB -->
                <div id="tabCodes" class="tab-content">
                    <div class="code-form">
                        <input type="text" id="codeTitel" placeholder="Titel...">
                        <textarea id="codeInhoud" rows="3" placeholder="Plak hier je code..."></textarea>
                        <button class="btn-new" style="margin:0; padding:8px;" onclick="slaCodeOp()">💾 Opslaan</button>
                    </div>
                    <div id="codesList" class="item-list"></div>
                </div>
            </div>

            <!-- CHAT INHOUD -->
            <div class="chat-area">
                <div class="chat-header">
                    <button class="menu-toggle" onclick="openSidebarMobile()">☰</button>
                    <h2 id="currentChatTitle">Chat</h2>
                    <span style="color: #475569; font-size: 0.8rem;">Online</span>
                </div>

                <div id="chatBox" class="chat-box"></div>

                <!-- Typ-indicator -->
                <div id="typingIndicator" class="typing-indicator">
                    <div class="typing-dots">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>

                <div class="input-bar">
                    <button id="micBtn" class="btn-icon btn-mic" onclick="toggleMicrofoon()">🎙️</button>
                    <input type="text" id="userInput" class="text-input" placeholder="Typ of spreek..." onkeypress="if(event.key === 'Enter') stuurBericht()">
                    <button class="btn-icon btn-send" onclick="stuurBericht()">Stuur</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        let chats = JSON.parse(localStorage.getItem('d0x_chats')) || [];
        let savedCodes = JSON.parse(localStorage.getItem('d0x_codes')) || [];
        let currentChatId = localStorage.getItem('d0x_current_chat_id') || null;

        const synth = window.speechSynthesis;
        const SpraakHerkenning = window.SpeechRecognition || window.webkitSpeechRecognition;
        let herkenning = SpraakHerkenning ? new SpraakHerkenning() : null;

        if (herkenning) {
            herkenning.lang = 'nl-NL';
            herkenning.onstart = () => document.getElementById('micBtn').classList.add('active');
            herkenning.onend = () => document.getElementById('micBtn').classList.remove('active');
            herkenning.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
                stuurBericht();
            };
        }

        async function startSysteem() {
            try {
                await puter.ai.chat("ping");
                const u = new SpeechSynthesisUtterance("");
                synth.speak(u);

                document.getElementById('startScreen').classList.remove('active');
                document.getElementById('mainScreen').classList.add('active');

                if (chats.length === 0) maakNieuweChat();
                laadChatsUI();
                laadCodesUI();
                openChat(currentChatId || chats[0].id);

            } catch (err) {
                alert("Verbinding mislukt. Zorg voor internet.");
            }
        }

        function openSidebarMobile() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('active');
        }

        function sluitSidebarMobile() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }

        function checkSluitSidebar() {
            if (window.innerWidth <= 768) sluitSidebarMobile();
        }

        function switchTab(tab) {
            document.getElementById('tabChatsBtn').classList.toggle('active', tab === 'chats');
            document.getElementById('tabCodesBtn').classList.toggle('active', tab === 'codes');
            document.getElementById('tabChats').classList.toggle('active', tab === 'chats');
            document.getElementById('tabCodes').classList.toggle('active', tab === 'codes');
        }

        function maakNieuweChat() {
            const nieuwId = 'chat_' + Date.now();
            chats.unshift({
                id: nieuwId,
                title: "Nieuwe Chat",
                history: [{ role: "system", content: "Je bent Dolphin0x, een snelle AI. Antwoord vlot in het Nederlands. Houd het kort omdat je antwoorden worden voorgelezen." }]
            });
            saveData();
            laadChatsUI();
            openChat(nieuwId);
        }

        function laadChatsUI() {
            const list = document.getElementById('chatsList');
            list.innerHTML = '';
            chats.forEach(c => {
                const item = document.createElement('div');
                item.className = `list-item ${c.id === currentChatId ? 'active' : ''}`;
                item.onclick = () => openChat(c.id);
                item.innerHTML = `
                    <div class="item-text">${c.title}</div>
                    <button class="btn-del" onclick="event.stopPropagation(); verwijderChat('${c.id}')">🗑️</button>
                `;
                list.appendChild(item);
            });
        }

        function openChat(id) {
            currentChatId = id;
            localStorage.setItem('d0x_current_chat_id', id);
            laadChatsUI();
            checkSluitSidebar();
            
            const activeChat = chats.find(c => c.id === id);
            if (!activeChat) return;

            document.getElementById('currentChatTitle').innerText = activeChat.title;
            
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            activeChat.history.forEach(m => {
                if(m.role !== 'system') {
                    const div = document.createElement('div');
                    div.className = `msg ${m.role === 'user' ? 'user' : 'ai'}`;
                    div.innerText = m.content;
                    box.appendChild(div);
                }
            });
            box.scrollTop = box.scrollHeight;
        }

        function verwijderChat(id) {
            chats = chats.filter(c => c.id !== id);
            saveData();
            if (chats.length === 0) maakNieuweChat();
            else openChat(chats[0].id);
        }

        async function stuurBericht() {
            const input = document.getElementById('userInput');
            const tekst = input.value.trim();
            if (!tekst) return;

            input.value = '';
            const s = new SpeechSynthesisUtterance("");
            synth.speak(s);

            const activeChat = chats.find(c => c.id === currentChatId);
            if (!activeChat) return;

            activeChat.history.push({ role: "user", content: tekst });
            if (activeChat.title === "Nieuwe Chat") {
                activeChat.title = tekst.substring(0, 15) + (tekst.length > 15 ? "..." : "");
            }

            openChat(currentChatId);

            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = 'block';
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;

            try {
                const antwoord = await puter.ai.chat(activeChat.history);
                let aiTekst = typeof antwoord === 'string' ? antwoord : (antwoord?.message?.content || "");

                indicator.style.display = 'none';
                activeChat.history.push({ role: "assistant", content: aiTekst });
                saveData();
                openChat(currentChatId);
                praat(aiTekst);

            } catch (error) {
                indicator.style.display = 'none';
                alert("Fout bij AI verbinding.");
            }
        }

        function slaCodeOp() {
            const titelInput = document.getElementById('codeTitel');
            const inhoudInput = document.getElementById('codeInhoud');
            const inhoud = inhoudInput.value.trim();
            if(!inhoud) return;

            savedCodes.unshift({ id: 'code_' + Date.now(), title: titelInput.value.trim() || "Snippet", code: inhoud });
            localStorage.setItem('d0x_codes', JSON.stringify(savedCodes));
            
            titelInput.value = ''; inhoudInput.value = '';
            laadCodesUI();
            checkSluitSidebar();
        }

        function laadCodesUI() {
            const list = document.getElementById('codesList');
            list.innerHTML = '';
            savedCodes.forEach(c => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.style.flexDirection = 'column'; item.style.alignItems = 'stretch';
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong style="color:#38bdf8; font-size:0.85rem;">${c.title}</strong>
                        <div>
                            <button class="btn-new" style="margin:0; padding:3px 6px; font-size:0.75rem; background:#10b981;" onclick="kopieerCode('${c.id}')">📋</button>
                            <button class="btn-del" style="margin-left:5px;" onclick="verwijderCode('${c.id}')">🗑️</button>
                        </div>
                    </div>
                    <div class="code-box">${escapeHtml(c.code)}</div>
                `;
                list.appendChild(item);
            });
        }

        function kopieerCode(id) {
            const target = savedCodes.find(c => c.id === id);
            if(target) {
                navigator.clipboard.writeText(target.code);
                alert("Gekopieerd naar klembord!");
            }
        }

        function verwijderCode(id) {
            savedCodes = savedCodes.filter(c => c.id !== id);
            localStorage.setItem('d0x_codes', JSON.stringify(savedCodes));
            laadCodesUI();
        }

        function praat(tekst) {
            if (!synth) return;
            synth.cancel();
            let schoneTekst = tekst.replace(/[*#_\[\]]/g, '');
            let zinnen = schoneTekst.match(/[^.!?]+[.!?]+/g) || [schoneTekst];
            let stemmen = synth.getVoices();
            let nlStem = stemmen.find(v => v.lang === 'nl-BE') || stemmen.find(v => v.lang === 'nl-NL' && !v.name.includes('Siri')) || stemmen.find(v => v.lang.includes('nl'));

            zinnen.forEach(zin => {
                if(zin.trim().length === 0) return;
                let u = new SpeechSynthesisUtterance(zin.trim());
                if (nlStem) u.voice = nlStem;
                u.pitch = 0.95; u.rate = 1.05;
                synth.speak(u);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(window.speechSynthesis) {
                window.speechSynthesis.getVoices();
            }
        });

        function toggleMicrofoon() {
            if (!herkenning) { alert("Microfoon niet ondersteund."); return; }
            if (synth.speaking) synth.cancel();
            herkenning.start();
        }

        function saveData() { localStorage.setItem('d0x_chats', JSON.stringify(chats)); }
        function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    </script>
</body>
</html>
