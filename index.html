<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolphin0x</title>
    <style>
        :root {
            --bg-main: #f4f6f9;
            --bg-panel: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-light: #eff6ff;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .app-container {
            width: 95vw; max-width: 1200px; height: 90vh;
            border: 1px solid var(--border-color); border-radius: 12px;
            background: var(--bg-panel); display: flex; flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        header {
            background: var(--bg-panel); padding: 0 24px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; height: 70px;
            border-top-left-radius: 12px; border-top-right-radius: 12px;
        }
        .header-title-box { display: flex; align-items: center; gap: 12px; }
        .header-dolphin { width: 32px; height: 32px; object-fit: contain; }
        header h1 { margin: 0; font-size: 1.25rem; font-weight: 600; color: var(--text-main); }
        .system-status { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); background: var(--bg-main); padding: 6px 12px; border-radius: 20px; }

        .auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; background: var(--bg-main); }
        .auth-box {
            background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 32px; max-width: 400px; width: 100%; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        .auth-box h2 { margin-top: 0; font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; text-align: center; }

        .portal-interface { display: none; flex-grow: 1; height: calc(100% - 70px); }
        
        .sidebar {
            width: 300px; border-right: 1px solid var(--border-color);
            background: var(--bg-panel); display: flex; flex-direction: column;
        }
        .section-header { 
            padding: 16px 20px 8px 20px; font-weight: 600; font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase;
        }
        
        .search-box-container { padding: 0 20px 10px 20px; }
        .search-input {
            width: 100%; padding: 8px 12px; font-size: 0.85rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-main); outline: none;
        }
        .search-input:focus { border-color: var(--accent); }

        .channel-list, .user-list { overflow-y: auto; }
        .chat-target-item {
            padding: 12px 20px; cursor: pointer; transition: background 0.15s;
            color: var(--text-main); display: flex; align-items: center; gap: 12px; font-size: 0.95rem;
        }
        .chat-target-item:hover { background: var(--bg-main); }
        .chat-target-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }

        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #fafafa; }
        .chat-header { 
            padding: 16px 24px; border-bottom: 1px solid var(--border-color); 
            font-weight: 600; font-size: 1rem; color: var(--text-main); background: var(--bg-panel);
        }
        .messages-feed { flex-grow: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 70%; position: relative; }
        .msg-wrapper.me { align-self: flex-end; }
        .msg-wrapper.them { align-self: flex-start; }
        
        .msg-author { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
        .me .msg-author { text-align: right; }

        .bubble-container { display: flex; align-items: center; gap: 8px; }
        .me .bubble-container { flex-direction: row-reverse; }

        .msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; word-wrap: break-word; line-height: 1.5; }
        .me .msg-bubble { background: var(--accent); color: #ffffff; border-bottom-right-radius: 2px; }
        .them .msg-bubble { background: var(--bg-panel); color: var(--text-main); border-bottom-left-radius: 2px; border: 1px solid var(--border-color); }
        
        /* Afbeelding Stijlen */
        .msg-image { max-width: 100%; max-height: 250px; border-radius: 8px; display: block; cursor: pointer; transition: opacity 0.15s; }
        .msg-image:hover { opacity: 0.9; }

        .delete-btn {
            background: transparent; color: var(--text-muted); border: none; padding: 4px; cursor: pointer;
            border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: color 0.15s, background 0.15s;
        }
        .delete-btn:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .delete-btn svg { width: 16px; height: 16px; fill: currentColor; }

        .msg-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
        .me .msg-meta { text-align: right; }

        .chat-input-bar { padding: 16px 24px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; background: var(--bg-panel); border-bottom-right-radius: 12px; align-items: center; }
        
        /* Media Upload Knop */
        .media-btn {
            background: var(--bg-main); color: var(--text-muted); border: 1px solid var(--border-color);
            width: 44px; height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.15s, color 0.15s; flex-shrink: 0;
        }
        .media-btn:hover { background: var(--accent-light); color: var(--accent); border-color: rgba(37, 99, 235, 0.2); }
        .media-btn svg { width: 20px; height: 20px; fill: currentColor; }

        input[type="text"], input[type="email"], input[type="password"] {
            background: var(--bg-main); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 8px;
            color: var(--text-main); font-size: 0.95rem; outline: none; width: 100%; transition: border 0.15s, box-shadow 0.15s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        .chat-input-bar input { flex-grow: 1; height: 44px; }
        .chat-input-bar button { height: 44px; }

        button {
            background: var(--accent); color: #ffffff; border: none; border-radius: 8px;
            padding: 12px 24px; font-weight: 500; font-size: 0.95rem; cursor: pointer; transition: background 0.15s;
        }
        button:hover { background: var(--accent-hover); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--border-color); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.05); }

        .auth-toggle { margin-top: 20px; font-size: 0.85rem; color: var(--accent); cursor: pointer; text-align: center; font-weight: 500; }
        .auth-toggle:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-title-box">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHg3Mnd4cHZhcDN3cmFwZHlsMG10OHl0bTBxdXN4YnY2amN1M3N3MiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/u00507MxtYmSk/giphy.gif" alt="" class="header-dolphin">
                <h1>Dolphin0x</h1>
            </div>
            <div id="systemStatus" class="system-status">Offline</div>
        </header>

        <div id="authScreen" class="auth-screen">
            <div class="auth-box">
                <h2 id="authTitle">...</h2>
                <div id="usernameGroup" style="display:none; margin-bottom:16px;">
                    <input type="text" id="authUsername" placeholder="">
                </div>
                <div style="margin-bottom:16px;">
                    <input type="email" id="authEmail" placeholder="">
                </div>
                <div style="margin-bottom:24px;">
                    <input type="password" id="authPassword" placeholder="">
                </div>
                <button style="width:100%;" id="authSubmitBtn" onclick="handleAuth()">...</button>
                <div id="authToggleText" class="auth-toggle" onclick="toggleAuthMode()">...</div>
            </div>
        </div>

        <div id="portalInterface" class="portal-interface">
            <div class="sidebar">
                <div class="section-header" id="channelsHeader">...</div>
                <div class="channel-list">
                    <div id="globalChannelItem" class="chat-target-item active" onclick="selectGlobalChat()">
                        ...
                    </div>
                </div>
                
                <div class="section-header" id="directHeader">...</div>
                <div class="search-box-container">
                    <input type="text" id="userSearch" class="search-input" placeholder="" oninput="filterUsers()">
                </div>
                <div id="userList" class="user-list" style="flex-grow:1;"></div>
                
                <button class="btn-danger" style="margin:20px; border-radius:8px;" id="logoutBtn" onclick="logout()">...</button>
            </div>

            <div class="chat-area">
                <div id="activeChatTarget" class="chat-header">...</div>
                <div id="messagesBox" class="messages-feed"></div>
                <div class="chat-input-bar">
                    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="uploadImage(this)">
                    
                    <div class="media-btn" onclick="document.getElementById('imageInput').click()" title="Verstuur foto">
                        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </div>

                    <input type="text" id="messageInput" placeholder="" onkeydown="if(event.key==='Enter') sendMessage()">
                    <button id="sendBtn" onclick="sendMessage()">...</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDocs, collection, addDoc, query, orderBy, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZ0H4mGe6VLzLSb2ow877Xz6j684CwBGU",
            authDomain: "dolphin0x.firebaseapp.com",
            databaseURL: "https://dolphin0x-default-rtdb.firebaseio.com",
            projectId: "dolphin0x",
            storageBucket: "dolphin0x.firebasestorage.app",
            messagingSenderId: "397971950369",
            appId: "1:397971950369:web:06c65ad929479656a10c60",
            measurementId: "G-KCEJDSHZFL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;
        let activeChatUserId = "global";
        let unsubscribeChat = null;
        let usersCache = {};
        let isRegisterMode = false;

        const languages = {
            nl: {
                login: "Inloggen", register: "Registreren", username: "Gebruikersnaam", email: "E-mailadres", password: "Wachtwoord",
                submit: "Verder", createAccount: "Account aanmaken", alreadyAccount: "Al een account? Inloggen",
                channels: "Kanalen", globalChat: "Algemene chat", directMessages: "Directe berichten", searchUser: "Zoek gebruiker...",
                logout: "Uitloggen", typeMessage: "Typ een bericht...", send: "Verzenden", online: "Online", offline: "Offline",
                you: "Jij", user: "Gebruiker", confirmDelete: "Weet je zeker dat je dit bericht wilt verwijderen?",
                errorFields: "Vul alle velden in.", errorPassword: "Het wachtwoord moet minimaal 6 tekens bevatten.", errorDelete: "Fout bij verwijderen: "
            },
            en: {
                login: "Login", register: "Register", username: "Username", email: "Email address", password: "Password",
                submit: "Continue", createAccount: "Create account", alreadyAccount: "Already an account? Login",
                channels: "Channels", globalChat: "Global chat", directMessages: "Direct messages", searchUser: "Search user...",
                logout: "Logout", typeMessage: "Type a message...", send: "Send", online: "Online", offline: "Offline",
                you: "You", user: "User", confirmDelete: "Are you sure you want to delete this message?",
                errorFields: "Please fill in all fields.", errorPassword: "The password must be at least 6 characters long.", errorDelete: "Error deleting: "
            }
        };

        const userLang = navigator.language.startsWith('nl') ? 'nl' : 'en';
        const t = languages[userLang];

        function initInterfaceLanguage() {
            document.getElementById("authTitle").innerText = t.login;
            document.getElementById("authUsername").placeholder = t.username;
            document.getElementById("authEmail").placeholder = t.email;
            document.getElementById("authPassword").placeholder = t.password;
            document.getElementById("authSubmitBtn").innerText = t.submit;
            document.getElementById("authToggleText").innerText = t.createAccount;
            
            document.getElementById("channelsHeader").innerText = t.channels;
            document.getElementById("globalChannelItem").innerText = t.globalChat;
            document.getElementById("directHeader").innerText = t.directMessages;
            document.getElementById("userSearch").placeholder = t.searchUser;
            document.getElementById("logoutBtn").innerText = t.logout;
            document.getElementById("messageInput").placeholder = t.typeMessage;
            document.getElementById("sendBtn").innerText = t.send;
            document.getElementById("systemStatus").innerText = t.offline;
        }

        initInterfaceLanguage();

        window.handleAuth = async function() {
            const email = document.getElementById("authEmail").value.trim();
            const password = document.getElementById("authPassword").value.trim();
            const username = document.getElementById("authUsername").value.trim();

            if(!email || !password || (isRegisterMode && !username)) {
                alert(t.errorFields); return;
            }
            if(password.length < 6) {
                alert(t.errorPassword); return;
            }

            try {
                if (isRegisterMode) {
                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "users", res.user.uid), {
                        uid: res.user.uid,
                        username: username,
                        email: email
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (err) {
                alert(err.message);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("authScreen").style.display = "none";
                document.getElementById("portalInterface").style.display = "flex";
                document.getElementById("systemStatus").innerText = t.online;
                await loadUserList();
                window.selectGlobalChat();
            } else {
                currentUser = null;
                document.getElementById("authScreen").style.display = "flex";
                document.getElementById("portalInterface").style.display = "none";
                document.getElementById("systemStatus").innerText = t.offline;
            }
        });

        window.logout = function() { signOut(auth); };

        window.toggleAuthMode = function() {
            const title = document.getElementById("authTitle");
            const userGroup = document.getElementById("usernameGroup");
            const toggleText = document.getElementById("authToggleText");
            
            isRegisterMode = !isRegisterMode;
            
            if (isRegisterMode) {
                title.innerText = t.register;
                userGroup.style.display = "block";
                toggleText.innerText = t.alreadyAccount;
            } else {
                title.innerText = t.login;
                userGroup.style.display = "none";
                toggleText.innerText = t.createAccount;
            }
        };

        async function loadUserList() {
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                const userListEl = document.getElementById("userList");
                userListEl.innerHTML = "";
                usersCache = {};

                querySnapshot.forEach((doc) => {
                    const userData = doc.data();
                    usersCache[userData.uid] = userData.username;

                    if(currentUser && userData.uid === currentUser.uid) return;

                    const item = document.createElement("div");
                    item.className = "chat-target-item user-node";
                    item.id = `user-${userData.uid}`;
                    item.setAttribute('data-username', userData.username.toLowerCase());
                    item.innerText = userData.username;
                    item.onclick = () => window.selectUserChat(userData.uid, userData.username);
                    userListEl.appendChild(item);
                });
            } catch (err) {
                console.error(err);
            }
        }

        window.filterUsers = function() {
            const query = document.getElementById("userSearch").value.toLowerCase();
            const userItems = document.querySelectorAll(".user-node");
            
            userItems.forEach(item => {
                const username = item.getAttribute("data-username");
                if (username.includes(query)) {
                    item.style.display = "flex";
                } else {
                    item.style.display = "none";
                }
            });
        };

        window.selectGlobalChat = function() {
            document.querySelectorAll(".chat-target-item").forEach(el => el.classList.remove("active"));
            document.getElementById("globalChannelItem").classList.add("active");

            activeChatUserId = "global";
            document.getElementById("activeChatTarget").innerText = t.globalChat;
            loadMessages();
        };

        window.selectUserChat = function(targetUid, targetUsername) {
            document.querySelectorAll(".chat-target-item").forEach(el => el.classList.remove("active"));
            const activeEl = document.getElementById(`user-${targetUid}`);
            if(activeEl) activeEl.classList.add("active");

            activeChatUserId = targetUid;
            document.getElementById("activeChatTarget").innerText = targetUsername;
            loadMessages();
        };

        function getChatId(uid1, uid2) {
            return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
        }

        function loadMessages() {
            if (unsubscribeChat) unsubscribeChat();

            let q;
            if (activeChatUserId === "global") {
                q = query(collection(db, "global_messages"), orderBy("timestamp", "asc"));
            } else {
                const chatId = getChatId(currentUser.uid, activeChatUserId);
                q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            }

            unsubscribeChat = onSnapshot(q, (snapshot) => {
                const box = document.getElementById("messagesBox");
                box.innerHTML = "";

                snapshot.forEach((subDoc) => {
                    const msg = subDoc.data();
                    const isMe = msg.senderId === currentUser.uid;
                    const messageId = subDoc.id;
                    const storagePath = msg.storagePath || null;
                    
                    let displayName = usersCache[msg.senderId] || msg.senderName || t.user;
                    if (isMe) displayName = t.you;

                    const wrapper = document.createElement("div");
                    wrapper.className = `msg-wrapper ${isMe ? 'me' : 'them'}`;
                    
                    const timeStr = msg.timestamp ? new Date(msg.timestamp.toMillis()).toLocaleTimeString(userLang === 'nl' ? 'nl-NL' : 'en-US', {hour: '2-digit', minute:'2-digit', hour12: false}) : '';

                    let deleteButtonHtml = '';
                    if (isMe) {
                        deleteButtonHtml = `
                            <button class="delete-btn" onclick="deleteMessage('${messageId}', '${storagePath ? encodeURIComponent(storagePath) : ''}')">
                                <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                            </button>
                        `;
                    }

                    // Content switch: tekst óf afbeelding
                    let contentHtml = `<div class="msg-bubble">${escapeHTML(msg.text)}</div>`;
                    if (msg.type === "image") {
                        contentHtml = `<img src="${msg.imageUrl}" class="msg-image" onclick="window.open('${msg.imageUrl}', '_blank')">`;
                    }

                    wrapper.innerHTML = `
                        <div class="msg-author">${displayName}</div>
                        <div class="bubble-container">
                            ${contentHtml}
                            ${deleteButtonHtml}
                        </div>
                        <div class="msg-meta">${timeStr}</div>
                    `;
                    box.appendChild(wrapper);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.deleteMessage = async function(messageId, encodedStoragePath) {
            if (!confirm(t.confirmDelete)) return;

            try {
                // Als er een gekoppeld bestand in Storage staat, deze eerst wissen
                if (encodedStoragePath) {
                    const storagePath = decodeURIComponent(encodedStoragePath);
                    const fileRef = ref(storage, storagePath);
                    await deleteObject(fileRef).catch(e => console.log("Storage file cleanup skipped or failed:", e));
                }

                if (activeChatUserId === "global") {
                    await deleteDoc(doc(db, "global_messages", messageId));
                } else {
                    const chatId = getChatId(currentUser.uid, activeChatUserId);
                    await deleteDoc(doc(db, "chats", chatId, "messages", messageId));
                }
            } catch (err) {
                alert(t.errorDelete + err.message);
            }
        };

        window.sendMessage = async function() {
            const textInput = document.getElementById("messageInput");
            const text = textInput.value.trim();
            if(!text || !currentUser) return;

            const myUsername = usersCache[currentUser.uid] || currentUser.email.split('@')[0];

            if (activeChatUserId === "global") {
                await addDoc(collection(db, "global_messages"), {
                    senderId: currentUser.uid,
                    senderName: myUsername,
                    text: text,
                    type: "text",
                    timestamp: new Date()
                });
            } else {
                const chatId = getChatId(currentUser.uid, activeChatUserId);
                await addDoc(collection(db, "chats", chatId, "messages"), {
                    senderId: currentUser.uid,
                    text: text,
                    type: "text",
                    timestamp: new Date()
                });
            }

            textInput.value = "";
        };

        window.uploadImage = async function(inputElement) {
            const file = inputElement.files[0];
            if (!file || !currentUser) return;

            const myUsername = usersCache[currentUser.uid] || currentUser.email.split('@')[0];
            const fileExtension = file.name.split('.').pop();
            const storagePath = `chat_images/${Date.now()}_${currentUser.uid}.${fileExtension}`;
            const fileRef = ref(storage, storagePath);

            try {
                
                const snapshot = await uploadBytes(fileRef, file);
                const imageUrl = await getDownloadURL(snapshot.ref);

               
                if (activeChatUserId === "global") {
                    await addDoc(collection(db, "global_messages"), {
                        senderId: currentUser.uid,
                        senderName: myUsername,
                        imageUrl: imageUrl,
                        storagePath: storagePath,
                        type: "image",
                        timestamp: new Date()
                    });
                } else {
                    const chatId = getChatId(currentUser.uid, activeChatUserId);
                    await addDoc(collection(db, "chats", chatId, "messages"), {
                        senderId: currentUser.uid,
                        imageUrl: imageUrl,
                        storagePath: storagePath,
                        type: "image",
                        timestamp: new Date()
                    });
                }
            } catch (err) {
                alert("Upload failed: " + err.message);
            }

            inputElement.value = ""; 
        };

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }
    </script>
</body>
</html>
